<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - CCP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; font-family: Arial; }
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1581092919535-7146ff1a5904') no-repeat center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      cursor: pointer;
    }
    .error { color: red; display: none; }
  </style>
</head>

<body>

<div class="box">
  <h2>Iniciar sesión</h2>

  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="login()">Entra r</button>

  <div id="error" class="error"></div>
</div>

<!-- 👇 AQUÍ SE CONECTA EL JS -->
<script src="app.js"></script>

</body>
</html>
