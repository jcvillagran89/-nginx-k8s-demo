<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard CCP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
}

.sidebar {
    width: 220px;
    background: #1a202c;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar h3 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 10px 0;
}

.main {
    flex: 1;
    padding: 20px;
    background: #f4f6f8;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 8px;
}

button {
    background: red;
    color: white;
    border: none;
    padding: 8px;
    cursor: pointer;
}
</style>

</head>

<body onload="checkAuth()">

<div class="sidebar">
    <h3>CCP Panel</h3>
    <a href="#">Inicio</a>
    <a href="#">Usuarios</a>
    <a href="#">Reportes</a>
</div>

<div class="main">
    <div class="header">
        <h2>Dashboard</h2>
        <button onclick="logout()">Salir</button>
    </div>

</div>

</div>

</html>
